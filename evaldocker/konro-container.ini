[policy]
policy=SecurityAwarePolicy

[policytimer]
timerseconds=30

[platformmonitor]
monitorperiod=20
kernelcpumodulenames=coretemp,k10temp,k8temp,cputemp
kernelbatterymodulenames=BAT

[http]
listenhost=127.0.0.1
listenport=8080

[securitymonitor]
securityperiod=3
# Weights tuned for this containerised IoT deployment: the emulated network
# does not route the node's outbound traffic, so the network factors
# (fanout/half-open) are not observable. Detection relies on the on-host
# signals that ARE reliable for a fixed-function sensor: an unexpected binary
# running in the node (newExec) and CPU abuse (cpuBurst) are high-confidence
# compromise indicators.
weight_fanout=0.03
weight_halfopen=0.02
weight_forkrate=0.15
weight_newexec=0.50
weight_cpuburst=0.30
weight_egress=0.05
weight_mem=0.10
ewma_alpha=0.30
publish_threshold=0.30

[securitypolicy]
threshold_t1=0.40
threshold_t2=0.60
threshold_t3=0.80
dwell_periods=3

# Manage container cgroups in place (0 = do NOT move the container's
# processes into konro.slice; Konro reads/writes the existing docker cgroup
# scope). NOTE: this key must be an integer (0/1), not true/false.
[container]
changecontainercgroup=0

[kubernetes]
changekubernetescgroup=0

[policy]
policy=SecurityAwarePolicy

[policytimer]
timerseconds=30

[platformmonitor]
monitorperiod=20
kernelcpumodulenames=coretemp,k10temp,k8temp,cputemp
kernelbatterymodulenames=BAT

[http]
listenhost=127.0.0.1
listenport=8080

[securitymonitor]
securityperiod=3
# Weights for this containerised IoT deployment. Network factors (fanout,
# half-open) are observable via /proc/net/tcp: non-blocking connect() from
# the Mirai scanner creates SYN_SENT sockets that persist for the TCP SYN
# retransmission window (up to ~127 s per scan target).
weight_fanout=0.15
weight_halfopen=0.10
weight_forkrate=0.15
weight_newexec=0.50
weight_cpuburst=0.30
weight_egress=0.10
weight_mem=0.10
weight_rawsocket=0.20
ewma_alpha=0.30
publish_threshold=0.30

[securitypolicy]
threshold_t1=0.40
threshold_t2=0.60
threshold_t3=0.80
dwell_periods=3

# Manage container cgroups in place (0 = do NOT move the container's
# processes into konro.slice; Konro reads/writes the existing docker cgroup
# scope). NOTE: this key must be an integer (0/1), not true/false.
[container]
changecontainercgroup=0

[kubernetes]
changekubernetescgroup=0

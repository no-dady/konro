[policy]
policy=SecurityAwarePolicy

[policytimer]
timerseconds=30

[platformmonitor]
monitorperiod=20
kernelcpumodulenames=coretemp,k10temp,k8temp,cputemp
kernelbatterymodulenames=BAT

[http]
listenhost=0.0.0.0
listenport=8080

[securitymonitor]
securityperiod=3
weight_fanout=0.30
weight_halfopen=0.25
weight_forkrate=0.15
weight_newexec=0.20
weight_cpuburst=0.10
weight_egress=0.15
weight_mem=0.10
weight_rawsocket=0.20
ewma_alpha=0.30
publish_threshold=0.30

[securitypolicy]
threshold_t1=0.40
threshold_t2=0.60
threshold_t3=0.80
dwell_periods=3

[container]
changecontainercgroup=0

[kubernetes]
changekubernetescgroup=0
